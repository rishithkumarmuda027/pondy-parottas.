<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondy Parottas | 140+ Signature Items</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #d32f2f; --gold: #ffc107; --bg: #f8f9fa; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        body { background: var(--bg); color: #1a1a1a; }

        header { background: white; padding: 15px 5%; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--red); letter-spacing: -1px; }

        .container { padding: 20px 5%; max-width: 1300px; margin: auto; }
        .search-bar { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid #ddd; margin-bottom: 30px; font-size: 1rem; outline: none; background: white; }

        .cat-title { font-size: 1.8rem; margin: 40px 0 20px; color: var(--red); border-left: 6px solid var(--gold); padding-left: 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .item-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; min-height: 45px; }
        .price { font-weight: 900; font-size: 1.2rem; color: #333; margin-bottom: 15px; }

        .qty-box { display: flex; align-items: center; justify-content: space-between; background: #f1f2f6; border-radius: 12px; padding: 5px; }
        .q-btn { width: 35px; height: 35px; border: none; background: white; border-radius: 8px; font-weight: 900; cursor: pointer; color: var(--red); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .add-btn { background: var(--red); color: white; border: none; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .cart-bar { position: fixed; bottom: 20px; left: 5%; right: 5%; max-width: 500px; margin: auto; background: #25d366; color: white; padding: 18px 25px; border-radius: 20px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4); z-index: 2000; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>

<header>
    <div class="logo">PONDY PAROTTAS</div>
    <div style="font-size: 12px; font-weight: 700; background: #eee; padding: 5px 10px; border-radius: 5px;">HYDERABAD</div>
</header>

<div class="container">
    <input type="text" id="search" class="search-bar" placeholder="Search 140+ items (Biryani, Parotta, Fish...)" onkeyup="filter()">
    <div id="menu-container"></div>
</div>

<div class="cart-bar" id="cart-bar" onclick="checkout()">
    <span id="cart-info">0 Items | ₹0</span>
    <span>CONFIRM ORDER ➔</span>
</div>

<script>
    const fullMenu = {
        "Ambur Special Biryani": [
            {n:"Ambur Chicken Biryani", p:240}, {n:"Ambur Mutton Spl Biryani", p:320}, {n:"Ambur Lollipop Biryani", p:250}, {n:"Ambur Chicken Fry Piece Biryani", p:250}, {n:"Ambur Prawn Biryani", p:330}, {n:"Ambur Biryani Rice & Egg", p:190}
        ],
        "Signature Parottas": [
            {n:"Nool Parotta (2 Pcs)", p:50}, {n:"Chicken Kothu Parotta", p:280}, {n:"Mutton Kothu Parotta", p:320}, {n:"Chicken Lappa", p:290}, {n:"Mutton Lappa", p:330}, {n:"Egg Roti Canai", p:220}, {n:"Chicken Roti Canai", p:280}
        ],
        "Soups": [
            {n:"Hot & Sour Soup", p:160}, {n:"Manchow Soup", p:160}, {n:"Sweetcorn Soup", p:160}, {n:"Lemon Coriander", p:160}, {n:"Chettinad Crab Soup", p:200}, {n:"Mutton Bone Soup", p:200}, {n:"Prawn Noodle Soup", p:220}, {n:"Mix Seafood Soup", p:260}
        ],
        "Veg Starters": [
            {n:"Veg Manchurian", p:230}, {n:"Crispy Corn", p:220}, {n:"Gobi Manchurian", p:260}, {n:"Tamilnadu Gobi 65", p:270}, {n:"Chilly Babycorn", p:270}, {n:"Butter Garlic Mushroom", p:280}, {n:"Paneer 65", p:320}
        ],
        "Non-Veg Starters": [
            {n:"Tamilnadu Chicken 65", p:310}, {n:"Chicken Lollipop", p:310}, {n:"Chicken Majestic", p:330}, {n:"Drums Of Heaven", p:330}, {n:"Nethili Fish Fry", p:310}, {n:"Apollo Fish", p:420}, {n:"Karaikal Squid Fry", p:390}, {n:"Chettinadu Crab Fry", p:390}, {n:"Prawn 65", p:420}
        ],
        "What An Egg": [
            {n:"Master Egg Kalaki", p:80}, {n:"Saarayakadai Muttai", p:230}, {n:"Regular Omelette", p:80}, {n:"Egg Bhurji", p:120}, {n:"Chilly Egg", p:220}
        ],
        "Tiffins": [
            {n:"Medu Vada Plate", p:70}, {n:"Ghee Pongal", p:80}, {n:"Madurai Mutton Kari Dosa", p:190}, {n:"Kal Dosa + Chicken Curry", p:180}, {n:"Wheat Poori + Mutton Kheema", p:240}
        ],
        "Drinks & Desserts": [
            {n:"Kadak Chai", p:40}, {n:"Kerala Kulukki", p:99}, {n:"Brownie Milkshake", p:199}, {n:"Oreo Milkshake", p:169}, {n:"Cashew Junnu", p:110}
        ]
    };

    let cart = {};

    function init() {
        const container = document.getElementById('menu-container');
        for (let cat in fullMenu) {
            let html = `<h2 class="cat-title">${cat}</h2><div class="grid">`;
            fullMenu[cat].forEach((item, index) => {
                const id = btoa(item.n).substring(0,8);
                // Unique image generator based on name
                const img = `https://loremflickr.com/400/250/indian,food,${item.n.split(' ')[0].toLowerCase()}?lock=${index + Math.random()}`;
                
                html += `
                <div class="card" data-search="${item.n.toLowerCase()}">
                    <img src="${img}" class="item-img" alt="${item.n}">
                    <div class="info">
                        <div class="item-name">${item.n}</div>
                        <div class="price">₹${item.p}</div>
                        <div id="btn-${id}">
                            <button class="add-btn" onclick="update('${id}', '${item.n}', ${item.p}, 1)">ADD TO CART</button>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    function update(id, name, price, change) {
        if (!cart[id]) cart[id] = { name, price, qty: 0 };
        cart[id].qty += change;
        
        const box = document.getElementById('btn-'+id);
        if (cart[id].qty > 0) {
            box.innerHTML = `
            <div class="qty-box">
                <button class="q-btn" onclick="update('${id}','${name}',${price},-1)">-</button>
                <span style="font-weight:900;">${cart[id].qty}</span>
                <button class="q-btn" onclick="update('${id}','${name}',${price},1)">+</button>
            </div>`;
        } else {
            delete cart[id];
            box.innerHTML = `<button class="add-btn" onclick="update('${id}','${name}',${price},1)">ADD TO CART</button>`;
        }
        
        let count = 0, total = 0;
        for (let k in cart) { count += cart[k].qty; total += (cart[k].qty * cart[k].price); }
        document.getElementById('cart-bar').style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('cart-info').innerText = `${count} Items | ₹${total}`;
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.dataset.search.includes(q) ? 'flex' : 'none';
        });
    }

    function checkout() {
        let bill = "*WEBSITE ORDER*%0A------------------%0A";
        for (let k in cart) { bill += `*${cart[k].qty} x ${cart[k].name}* - ₹${cart[k].qty * cart[k].price}%0A`; }
        bill += `%0A*TOTAL: ${document.getElementById('cart-info').innerText.split('|')[1]}*`;
        window.open(`https://wa.me/918186004000?text=${bill}`);
    }

    init();
</script>
</body>
</html>
