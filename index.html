<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondy Parottas | Elite Ordering System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #050505; --surface: #111111; --accent: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--dark); color: #fff; overflow-x: hidden; line-height: 1.6; }

        /* Floating Premium Header */
        header { background: rgba(5, 5, 5, 0.9); padding: 20px 8%; position: sticky; top: 0; z-index: 3000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(197, 160, 89, 0.1); backdrop-filter: blur(20px); }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; letter-spacing: -1px; cursor: pointer; }
        nav { display: flex; gap: 25px; }
        nav span { font-size: 11px; font-weight: 700; color: #666; cursor: pointer; transition: 0.3s; letter-spacing: 2px; }
        nav span.active, nav span:hover { color: var(--gold); }

        /* Modern Category Nav */
        #cat-scroll { background: #080808; padding: 12px 5%; position: sticky; top: 75px; z-index: 2000; display: none; gap: 10px; overflow-x: auto; border-bottom: 1px solid #111; }
        #cat-scroll::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 22px; background: var(--surface); border: 1px solid #222; color: #777; border-radius: 50px; font-size: 11px; white-space: nowrap; cursor: pointer; text-transform: uppercase; font-weight: 800; transition: 0.3s; }
        .tab:hover { border-color: var(--gold); color: var(--gold); }

        /* Pages */
        .page { display: none; padding: 40px 8%; max-width: 1300px; margin: auto; min-height: 90vh; }
        .page.active { display: block; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Hero */
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 5rem; font-weight: 900; line-height: 0.85; margin-bottom: 25px; }
        .hero p { color: var(--gold); letter-spacing: 5px; font-size: 12px; margin-bottom: 40px; }
        .cta { background: var(--gold); color: #000; padding: 20px 50px; border: none; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .cta:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(197, 160, 89, 0.3); background: #fff; }

        /* Search & Menu */
        .search-container { margin-bottom: 40px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid #222; padding: 22px 30px; color: #fff; border-radius: 12px; outline: none; font-size: 1rem; border-left: 5px solid var(--gold); }
        .section-title { font-size: 2rem; color: var(--gold); margin: 60px 0 30px; text-transform: uppercase; letter-spacing: 6px; font-weight: 300; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--surface); padding: 30px; border: 1px solid #1a1a1a; transition: 0.4s; border-radius: 8px; position: relative; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #161616; }
        .card-name { font-weight: 600; font-size: 1.1rem; color: #eee; margin-bottom: 10px; display: block; }
        .card-price { color: var(--gold); font-size: 1.4rem; font-weight: 400; font-family: serif; font-style: italic; }

        /* Add Buttons */
        .add-btn { background: var(--gold); color: #000; width: 100%; border: none; padding: 12px; font-weight: 900; margin-top: 20px; cursor: pointer; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .qty-controls { display: flex; justify-content: space-between; align-items: center; background: #000; border: 1px solid #222; padding: 6px 15px; border-radius: 4px; margin-top: 20px; }
        .qty-btn { background: none; border: none; color: var(--gold); font-size: 24px; cursor: pointer; width: 30px; }

        /* Locations */
        .loc-card { background: var(--surface); padding: 35px; border-left: 4px solid var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .loc-info h3 { color: var(--gold); font-size: 1.5rem; margin-bottom: 5px; }
        .loc-info p { color: #666; font-size: 13px; }
        .map-tag { color: #fff; text-decoration: none; border-bottom: 1px solid var(--gold); font-weight: 700; font-size: 12px; }

        /* Checkout Modal */
        #checkout-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--gold); padding: 40px; width: 100%; max-width: 480px; border-radius: 8px; }
        .modal-box h2 { font-weight: 900; letter-spacing: -1px; margin-bottom: 25px; }
        .input-wrap { margin-bottom: 15px; }
        .input-wrap label { font-size: 10px; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .field { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 4px; outline: none; }

        /* Float Bar */
        .float-bar { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: var(--gold); color: #000; padding: 22px 40px; display: none; justify-content: space-between; align-items: center; z-index: 4000; font-weight: 900; text-transform: uppercase; box-shadow: 0 25px 60px rgba(0,0,0,0.8); cursor: pointer; border-radius: 4px; }

        footer { padding: 80px; text-align: center; color: #222; font-size: 10px; letter-spacing: 5px; border-top: 1px solid #0a0a0a; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="nav('home')">PONDY PAROTTAS</div>
    <nav>
        <span onclick="nav('home')" id="n-home" class="active">HOME</span>
        <span onclick="nav('menu')" id="n-menu">MENU</span>
        <span onclick="nav('loc')" id="n-loc">OUTLETS</span>
    </nav>
</header>

<div id="cat-scroll"></div>

<div id="home" class="page active">
    <div class="hero">
        <p>A LEGACY OF HYDERABAD</p>
        <h1>THE ART OF<br><span style="color:var(--gold);">PAROTTA</span></h1>
        <button class="cta" onclick="nav('menu')">ORDER DIRECT ➔</button>
    </div>
</div>

<div id="menu" class="page">
    <div class="search-container">
        <input type="text" id="search" class="search-input" placeholder="Search our 140+ delicacies..." onkeyup="searchMenu()">
    </div>
    <div id="menu-area"></div>
</div>

<div id="loc" class="page">
    <h2 class="section-title">Official Outlets</h2>
    <div id="loc-area"></div>
</div>

<div id="checkout-modal">
    <div class="modal-box">
        <h2>DELIVERY INFO</h2>
        <div class="input-wrap">
            <label>Name</label>
            <input type="text" id="cust-name" class="field" placeholder="Enter full name">
        </div>
        <div class="input-wrap">
            <label>Select Outlet</label>
            <select id="cust-branch" class="field">
                <option value="">Choose nearest branch...</option>
                <option value="Kukatpally">Kukatpally (Manjeera Mall)</option>
                <option value="Hitech City">Hitech City (Kothaguda)</option>
                <option value="SR Nagar">SR Nagar (Metro Station)</option>
                <option value="Manikonda">Manikonda (Sreeram Nagar)</option>
                <option value="Miyapur">Miyapur (Madinaguda)</option>
                <option value="Chanda Nagar">Chanda Nagar (Pipeline Road)</option>
            </select>
        </div>
        <div class="input-wrap">
            <label>Full Address / Google Maps Link</label>
            <textarea id="cust-address" class="field" rows="3" placeholder="Paste location or enter address"></textarea>
        </div>
        <button class="cta" style="width:100%; margin-top:10px;" onclick="finalize()">PLACE ORDER ON WHATSAPP</button>
        <button style="background:none; border:none; color:#444; width:100%; margin-top:20px; cursor:pointer; font-size:11px; letter-spacing:2px;" onclick="closeM()">CANCEL</button>
    </div>
</div>

<div class="float-bar" id="float-bar" onclick="openM()">
    <div id="cart-text">0 ITEMS | ₹0</div>
    <div>CONFIRM ORDER ➔</div>
</div>

<footer>PONDY PAROTTAS HYDERABAD — SINCE 2018</footer>

<script>
    const data = {
        "Soups": [
            {n:"Pondicherry Mutton Bone Soup", p:230}, {n:"Chettinadu Crab Soup", p:260}, {n:"Chicken Manchow Soup", p:220}, {n:"Veg Sweetcorn Soup", p:180}
        ],
        "Ambur Biryani": [
            {n:"Ambur Mutton Biryani", p:480}, {n:"Ambur Chicken Biryani", p:350}, {n:"Ambur Prawn Biryani", p:480}, {n:"Ambur Egg Biryani", p:260}, {n:"Ambur Lollipop Biryani", p:370}
        ],
        "Parottas": [
            {n:"Nool Parotta (2 Pcs)", p:50}, {n:"Chicken Kothu Parotta", p:320}, {n:"Mutton Kothu Parotta", p:380}, {n:"Veg Kothu Parotta", p:240}, {n:"Mutton Lappa", p:410}, {n:"Chicken Roti Canai", p:320}
        ],
        "Tamilnadu Starters": [
            {n:"Tamilnadu Chicken 65", p:310}, {n:"Chicken Majestic", p:330}, {n:"Master Egg Kalaki", p:80}, {n:"Apollo Fish", p:420}, {n:"Karaikal Squid Fry", p:390}
        ],
        "Curries": [
            {n:"Chettinadu Mutton Fry", p:490}, {n:"Chicken Masala", p:340}, {n:"Paneer Butter Masala", p:320}, {n:"Egg Masala", p:240}
        ],
        "Drinks": [
            {n:"Kerala Kulukki", p:99}, {n:"Kadak Chai", p:40}, {n:"Brownie Milkshake", p:199}, {n:"Nannari Sharbat", p:99}
        ]
    };

    const outlets = [
        {n:"Kukatpally", a:"Near Manjeera Mall, KPHB Colony", link:"https://maps.app.goo.gl/OfficialLink8"},
        {n:"Hitech City", a:"Hitex Road, Kothaguda Junction", link:"https://maps.app.goo.gl/OfficialLink9"},
        {n:"SR Nagar", a:"Yousufguda Main Rd, Pillar 1489", link:"https://maps.google.com/?cid=3001203738066171063&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ0"},
        {n:"Manikonda", a:"Puppalguda Main Road, Manikonda", link:"https://www.google.com/maps/contrib/109409744936500634838/reviews"},
        {n:"Miyapur", a:"Madinaguda, Deepthisri Nagar", link:"https://maps.google.com/?cid=3001203738066171063&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ2"},
        {n:"Chanda Nagar", a:"Pipeline Road, Chanda Nagar Area", link:"https://www.google.com/maps/reviews/data=!4m6!14m5!1m4!2m3!1sCi9DQUlRQUNvZENodHljRjlvT2t0UUxVczNhelpPWTBaRlZFVnhMV1pQYUVwc01VRRAB!2m1!1s0x3bcb9197239cc7b5:0xe932a5bee96695fc"}
    ];

    let cart = {};

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav span').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('cat-scroll').style.display = (id === 'menu') ? 'flex' : 'none';
        document.getElementById('n-' + id).classList.add('active');
        window.scrollTo(0,0);
    }

    function init() {
        const menu = document.getElementById('menu-area');
        const scroll = document.getElementById('cat-scroll');
        const loc = document.getElementById('loc-area');
        let count = 0;

        for (let cat in data) {
            const catId = "c-" + cat.replace(/\s/g, '');
            scroll.innerHTML += `<div class="tab" onclick="document.getElementById('${catId}').scrollIntoView({behavior:'smooth', block:'start'})">${cat}</div>`;
            let html = `<div id="${catId}" style="padding-top:120px; margin-top:-110px;"><h2 class="section-title">${cat}</h2><div class="menu-grid">`;
            data[cat].forEach(item => {
                const key = "it-" + (count++);
                html += `<div class="card" data-s="${item.n.toLowerCase()}">
                    <span class="card-name">${item.n}</span>
                    <span class="card-price">₹${item.p}</span>
                    <div id="btn-${key}"><button class="add-btn" onclick="updateQty('${key}','${item.n}',${item.p},1)">ADD TO CART</button></div>
                </div>`;
            });
            menu.innerHTML += html + '</div></div>';
        }

        outlets.forEach(o => {
            loc.innerHTML += `<div class="loc-card">
                <div class="loc-info"><h3>${o.n}</h3><p>${o.a}</p></div>
                <a href="${o.link}" target="_blank" class="map-tag">DIRECTIONS ➔</a>
            </div>`;
        });
    }

    function updateQty(key, name, price, delta) {
        if (!cart[key]) cart[key] = { name, price, qty: 0 };
        cart[key].qty += delta;
        const area = document.getElementById('btn-' + key);
        if (cart[key].qty > 0) {
            area.innerHTML = `<div class="qty-controls">
                <button class="qty-btn" onclick="updateQty('${key}','${name}',${price},-1)">-</button>
                <span style="font-weight:900;">${cart[key].qty}</span>
                <button class="qty-btn" onclick="updateQty('${key}','${name}',${price},1)">+</button></div>`;
        } else {
            delete cart[key];
            area.innerHTML = `<button class="add-btn" onclick="updateQty('${key}','${name}',${price},1)">ADD TO CART</button>`;
        }
        let qty = 0, total = 0;
        for (let k in cart) { qty += cart[k].qty; total += (cart[k].qty * cart[k].price); }
        document.getElementById('float-bar').style.display = qty > 0 ? 'flex' : 'none';
        let delFee = total >= 500 ? 0 : 40;
        document.getElementById('cart-text').innerHTML = `${qty} ITEMS | ₹${total + delFee} <span style="font-size:8px; opacity:0.5;">(INC. DELIVERY)</span>`;
    }

    function searchMenu() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.s.includes(q) ? 'block' : 'none');
    }

    function openM() { document.getElementById('checkout-modal').style.display = 'flex'; }
    function closeM() { document.getElementById('checkout-modal').style.display = 'none'; }

    function finalize() {
        const n = document.getElementById('cust-name').value;
        const b = document.getElementById('cust-branch').value;
        const a = document.getElementById('cust-address').value;
        if (!n || !b || !a) { alert("Please fill all fields!"); return; }

        let sub = 0;
        let msg = `*PONDY PAROTTAS: NEW ORDER*%0A--------------------------%0A*Name:* ${n}%0A*Outlet:* ${b}%0A*Address:* ${a}%0A--------------------------%0A`;
        for (let k in cart) {
            msg += `*${cart[k].qty} x ${cart[k].name}* - ₹${cart[k].qty * cart[k].price}%0A`;
            sub += (cart[k].qty * cart[k].price);
        }
        let fee = sub >= 500 ? 0 : 40;
        msg += `--------------------------%0A*Subtotal:* ₹${sub}%0A*Delivery Fee:* ₹${fee}%0A*TOTAL: ₹${sub + fee}*%0A--------------------------`;
        
        window.open(`https://wa.me/918186004000?text=${msg}`);
        location.reload();
    }

    init();
</script>
</body>
</html>
