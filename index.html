<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondy Parottas | Elite Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #151515; --text: #ffffff; --accent: #d32f2f; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        header { background: rgba(10, 10, 10, 0.98); padding: 20px 8%; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); backdrop-filter: blur(15px); }
        .logo { font-weight: 900; font-size: 1.8rem; color: var(--gold); letter-spacing: -1px; text-transform: uppercase; cursor: pointer; }
        nav { display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #888; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--gold); }

        .page { display: none; opacity: 0; padding: 40px 8%; max-width: 1400px; margin: auto; min-height: 80vh; }
        .page.active { display: block; opacity: 1; animation: fadeInUp 0.6s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 4rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .gold-btn { background: var(--gold); color: #000; padding: 18px 40px; border: none; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .gold-btn:hover { background: #fff; transform: translateY(-3px); }

        .search-container { margin-bottom: 40px; }
        .search-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #222; padding: 15px 0; color: white; font-size: 1.2rem; outline: none; }
        .search-input:focus { border-color: var(--gold); }
        
        .cat-title { font-size: 1.8rem; margin: 50px 0 25px; color: var(--gold); font-weight: 300; letter-spacing: 4px; text-transform: uppercase; border-left: 3px solid var(--gold); padding-left: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .item-card { background: var(--card); padding: 25px; border: 1px solid #1f1f1f; transition: 0.3s; }
        .item-card:hover { border-color: var(--gold); }
        .item-name { font-weight: 600; font-size: 1rem; color: #eee; display: block; margin-bottom: 8px; height: 2.5rem; overflow: hidden; }
        .item-price { color: var(--gold); font-size: 1.2rem; font-weight: 400; }

        .qty-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .add-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .qty-controls { display: flex; align-items: center; gap: 15px; background: #000; padding: 5px 12px; border: 1px solid #333; }
        .qty-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }

        .loc-card { background: #111; padding: 30px; border-left: 3px solid var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .map-btn { color: #fff; text-decoration: none; border-bottom: 1px solid var(--gold); font-size: 13px; font-weight: 600; }

        .cart-footer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--gold); color: #000; padding: 20px 30px; display: none; justify-content: space-between; align-items: center; z-index: 2000; font-weight: 900; text-transform: uppercase; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        footer { padding: 60px; text-align: center; color: #444; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="nav('home')">Pondy Parottas</div>
    <nav>
        <a onclick="nav('home')" id="n-home" class="active">Home</a>
        <a onclick="nav('menu')" id="n-menu">Menu</a>
        <a onclick="nav('loc')" id="n-loc">Locations</a>
    </nav>
</header>

<div id="home" class="page active">
    <div class="hero">
        <p style="letter-spacing: 5px; color: var(--gold); margin-bottom: 10px;">HYDERABAD'S FINEST</p>
        <h1>ELITE TASTE</h1>
        <p style="color: #666; max-width: 500px; margin-bottom: 30px;">An extensive collection of 140+ authentic dishes, from the heart of Pondicherry to the streets of Hyderabad.</p>
        <button class="gold-btn" onclick="nav('menu')">View Full Menu</button>
    </div>
</div>

<div id="menu" class="page">
    <div class="search-container">
        <input type="text" id="search" class="search-input" placeholder="Search 140+ items (Biryani, Kalaki, Dosa...)" onkeyup="filterMenu()">
    </div>
    <div id="menu-render"></div>
</div>

<div id="loc" class="page">
    <h2 class="cat-title">Our Establishments</h2>
    <div id="loc-render"></div>
</div>

<div class="cart-footer" id="cart-bar" onclick="checkout()">
    <div id="cart-data">0 ITEMS | ₹0</div>
    <div>Order via WhatsApp ➔</div>
</div>

<script>
    const fullMenu = {
        "Premium Soups": [
            {n:"Hot & Sour Soup", p:160}, {n:"Manchow Soup", p:160}, {n:"Sweetcorn Soup", p:160}, {n:"Lemon Coriander Soup", p:160}, {n:"Curry Leaf Soup", p:160}, {n:"Chicken Manchow Soup", p:180}, {n:"Chettinadu Chicken Rasam", p:200}, {n:"Chettinad Crab Soup", p:200}, {n:"Mutton Bone Soup", p:200}, {n:"Prawn Noodle Soup", p:220}, {n:"Mix Seafood Soup", p:260}, {n:"Burmese Big Soup", p:260}
        ],
        "Ambur Special Biryani": [
            {n:"Ambur Chicken Biryani", p:240}, {n:"Ambur Mutton Spl Biryani", p:320}, {n:"Ambur Lollipop Biryani", p:250}, {n:"Ambur Chicken Fry Piece Biryani", p:250}, {n:"Ambur Prawn Biryani", p:330}, {n:"Ambur Biryani Rice & Egg", p:190}
        ],
        "World of Parottas": [
            {n:"Single Kerala Parotta", p:40}, {n:"Single Wheat Parotta", p:40}, {n:"Nool Parotta (2 Pcs)", p:50}, {n:"Chicken Kothu Parotta", p:280}, {n:"Mutton Kothu Parotta", p:320}, {n:"Egg Kothu Parotta", p:210}, {n:"Veg Kothu Parotta", p:190}, {n:"Chicken Lappa", p:290}, {n:"Mutton Lappa", p:330}, {n:"Double Egg Lappa", p:220}
        ],
        "What An Egg": [
            {n:"Master Egg Kalaki", p:80}, {n:"Chicken Kalaki", p:130}, {n:"Prawn Kalaki", p:150}, {n:"Regular Omelette - Double", p:80}, {n:"Onion Masala Omelette", p:100}, {n:"Egg Bhurji - Double", p:120}, {n:"Chilly Egg", p:220}, {n:"Egg Manchurian", p:220}, {n:"Saarayakadai Muttai", p:230}, {n:"Egg Tawa Fry", p:230}, {n:"Egg Tawa Fry - Pepper", p:230}
        ],
        "Veg Starters": [
            {n:"Veg Manchurian", p:230}, {n:"Crispy Veg", p:220}, {n:"Crispy Corn", p:220}, {n:"Gobi Manchurian", p:260}, {n:"Tamilnadu Gobi 65", p:270}, {n:"Chilly Babycorn", p:270}, {n:"Babycorn Manchurian", p:270}, {n:"Chilly Mushroom", p:270}, {n:"Mushroom Manchurian", p:270}, {n:"Butter Garlic Mushroom", p:280}, {n:"Mushroom Salt And Pepper", p:280}, {n:"Hyderabadi Paneer 65", p:300}, {n:"Tamilnadu Paneer 65", p:320}, {n:"Chilly Paneer", p:300}, {n:"Paneer Manchurian", p:300}
        ],
        "Non Veg Starters": [
            {n:"Tamilnadu Chicken 65", p:310}, {n:"Chicken Lollipop", p:310}, {n:"Chicken Majestic", p:330}, {n:"Hongkong Chicken", p:330}, {n:"Ginger Chicken", p:330}, {n:"Garlic Chicken", p:330}, {n:"Chilly Chicken", p:330}, {n:"Drums Of Heaven", p:330}, {n:"Tamilnadu Chicken Pakoda", p:340}, {n:"Hyderabadi Chicken 65", p:340}, {n:"Nethili Fish Fry", p:310}, {n:"Karaikal Squid Fry", p:390}, {n:"Chettinadu Crab Fry", p:390}, {n:"Apollo Fish", p:420}, {n:"Chilly Prawns", p:420}, {n:"Tamilnadu Prawn 65", p:420}, {n:"Ginger Fish", p:420}
        ],
        "Pongal & Vada": [
            {n:"Medu Vada Plate", p:70}, {n:"Sambar Vada Plate", p:70}, {n:"Ghee Pongal", p:80}, {n:"Ghee Sambar Dip Pongal", p:90}
        ],
        "Signature Dosas & Tiffins": [
            {n:"Madurai Mutton Kari Dosa", p:190}, {n:"Karam Podi Kal Dosa", p:110}, {n:"Kal Dosa + Chicken Curry", p:180}, {n:"Kal Dosa + Mutton Kheema", p:240}, {n:"Egg Uttapam + Chicken Curry", p:220}, {n:"Egg Uttapam + Mutton Kheema", p:280}, {n:"Wheat Poori + Mutton Kheema", p:240}
        ],
        "Smoking Tawa": [
            {n:"Paneer Tawa Fry", p:310}, {n:"Madurai Pichi Potta Kozhi", p:340}, {n:"Virudhunagar Mutton Sukka", p:420}, {n:"Prawn Pepper Fry", p:420}, {n:"Tn Boneless Tawa Fish", p:420}
        ],
        "Fried Rice & Noodles": [
            {n:"Veg Fried Rice", p:189}, {n:"Veg Noodles", p:189}, {n:"Butter Garlic Rice", p:250}, {n:"Gobi Fried Rice", p:230}, {n:"Paneer Fried Rice", p:230}, {n:"Egg Double Fried Rice", p:250}, {n:"Chicken Fried Rice", p:270}, {n:"Prawn Fried Rice", p:300}, {n:"Mix Non Veg Fried Rice", p:340}
        ],
        "Indian Rice": [
            {n:"Jeera Rice", p:210}, {n:"Curd Rice", p:180}, {n:"Ghee Kaju Rice", p:230}, {n:"Mix Veg Tawa Rice", p:230}, {n:"Egg Tawa Rice", p:230}, {n:"Chicken Tawa Rice", p:270}, {n:"Mutton Tawa Rice", p:320}
        ],
        "Pondy Beach Road": [
            {n:"Nethili Fish Kuzhambu + Rice", p:220}, {n:"BL Fish Kuzhambu + Rice", p:280}, {n:"Chettinadu Crab Curry + Rice", p:300}, {n:"Prawn Thokku + Rice", p:300}
        ],
        "Pizzas & Canai": [
            {n:"Egg Roti Canai", p:220}, {n:"Chicken Roti Canai", p:280}, {n:"Mutton Roti Canai", p:320}, {n:"Veg Twist Pizza", p:290}, {n:"Paneer Pizza", p:320}, {n:"Chicken Pizza", p:360}
        ],
        "Drinks & Desserts": [
            {n:"Kadak Chai", p:40}, {n:"Kerala Kulukki", p:99}, {n:"Nannari Sharbat", p:99}, {n:"Fresh Lime Soda", p:89}, {n:"Mint Mojito", p:149}, {n:"Brownie Milkshake", p:199}, {n:"Oreo Milkshake", p:169}, {n:"Cashew Junnu", p:110}, {n:"Chocolate Junnu", p:120}
        ]
    };

    const branches = [
        {n: "Kukatpally", a: "Near Manjeera Mall", q: "Pondy+Parottas+KPHB"},
        {n: "Hitech City", a: "HITEX Road, Kothaguda", q: "Pondy+Parottas+Hitech+City"},
        {n: "SR Nagar", a: "Beside Metro Station", q: "Pondy+Parottas+SR+Nagar"},
        {n: "Manikonda", a: "Sreeram Nagar Colony", q: "Pondy+Parottas+Manikonda"},
        {n: "Chanda Nagar", a: "Pipeline Road", q: "Pondy+Parottas+Chanda+Nagar"},
        {n: "Miyapur", a: "New Branch", q: "Pondy+Parottas+Miyapur"}
    ];

    let cart = {};

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
        window.scrollTo(0,0);
    }

    function init() {
        const menuEl = document.getElementById('menu-render');
        for (let cat in fullMenu) {
            let html = `<h2 class="cat-title">${cat}</h2><div class="menu-grid">`;
            fullMenu[cat].forEach(item => {
                const id = btoa(item.n).substring(0,8);
                html += `
                <div class="item-card" data-s="${item.n.toLowerCase()}">
                    <span class="item-name">${item.n}</span>
                    <span class="item-price">₹${item.p}</span>
                    <div class="qty-row" id="ctrl-${id}">
                        <button class="add-btn" onclick="update('${id}','${item.n}',${item.p}, 1)">Add to Cart</button>
                    </div>
                </div>`;
            });
            menuEl.innerHTML += html + '</div>';
        }

        const locEl = document.getElementById('loc-render');
        branches.forEach(b => {
            locEl.innerHTML += `
            <div class="loc-card">
                <div><h3>${b.n}</h3><p>${b.a}</p></div>
                <a href="https://www.google.com/maps/search/${b.q}" target="_blank" class="map-btn">Get Directions ➔</a>
            </div>`;
        });
    }

    function update(id, name, price, change) {
        if (!cart[id]) cart[id] = { name, price, qty: 0 };
        cart[id].qty += change;
        
        const ctrl = document.getElementById('ctrl-'+id);
        if (cart[id].qty > 0) {
            ctrl.innerHTML = `
            <div class="qty-controls">
                <button class="qty-btn" onclick="update('${id}','${name}',${price},-1)">-</button>
                <span style="font-weight:900">${cart[id].qty}</span>
                <button class="qty-btn" onclick="update('${id}','${name}',${price},1)">+</button>
            </div>`;
        } else {
            delete cart[id];
            ctrl.innerHTML = `<button class="add-btn" onclick="update('${id}','${name}',${price}, 1)">Add to Cart</button>`;
        }
        
        let count = 0, total = 0;
        for (let k in cart) { count += cart[k].qty; total += (cart[k].qty * cart[k].price); }
        document.getElementById('cart-bar').style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('cart-data').innerText = `${count} ITEMS | ₹${total}`;
    }

    function filterMenu() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.item-card').forEach(c => {
            c.style.display = c.dataset.s.includes(q) ? 'block' : 'none';
        });
    }

    function checkout() {
        let text = "*PONDY PAROTTAS: PREMIUM ORDER*%0A------------------%0A";
        for (let k in cart) { text += `*${cart[k].qty} x ${cart[k].name}* - ₹${cart[k].qty * cart[k].price}%0A`; }
        text += `%0A*Total Amount: ${document.getElementById('cart-data').innerText.split('|')[1]}*`;
        window.open(`https://wa.me/918186004000?text=${encodeURIComponent(text)}`);
    }

    init();
</script>
</body>
</html>
