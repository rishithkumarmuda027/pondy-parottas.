<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondy Parottas | Elite Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #151515; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--dark); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        /* Header */
        header { background: rgba(10, 10, 10, 0.98); padding: 15px 8%; position: sticky; top: 0; z-index: 2000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); backdrop-filter: blur(15px); }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; cursor: pointer; }
        nav a { text-decoration: none; color: #888; font-weight: 600; font-size: 11px; text-transform: uppercase; margin-left: 15px; cursor: pointer; }
        nav a.active { color: var(--gold); }

        /* Category Quick Nav - NEW */
        .cat-quick-nav { background: #111; padding: 10px 5%; position: sticky; top: 65px; z-index: 1500; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #222; -webkit-overflow-scrolling: touch; }
        .cat-quick-nav::-webkit-scrollbar { display: none; }
        .cat-tab { padding: 6px 15px; background: #1a1a1a; border: 1px solid #333; color: #aaa; border-radius: 4px; font-size: 11px; white-space: nowrap; cursor: pointer; text-transform: uppercase; font-weight: 600; }
        .cat-tab:hover { border-color: var(--gold); color: var(--gold); }

        /* Page System */
        .page { display: none; padding: 20px 8%; max-width: 1400px; margin: auto; min-height: 80vh; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Search */
        .search-container { margin: 20px 0; }
        .search-input { width: 100%; background: #111; border: 1px solid #333; padding: 15px 20px; color: white; font-size: 1rem; border-radius: 8px; outline: none; }
        .search-input:focus { border-color: var(--gold); }
        
        .cat-title { font-size: 1.6rem; margin: 50px 0 20px; color: var(--gold); font-weight: 300; letter-spacing: 3px; text-transform: uppercase; border-left: 3px solid var(--gold); padding-left: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .item-card { background: var(--card); padding: 25px; border: 1px solid #1f1f1f; position: relative; }
        .item-name { font-weight: 600; font-size: 0.95rem; color: #eee; margin-bottom: 5px; height: 2.4rem; overflow: hidden; display: block; }
        .item-price { color: var(--gold); font-size: 1.1rem; }

        .qty-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .add-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .qty-controls { display: flex; align-items: center; gap: 15px; background: #000; padding: 4px 10px; border: 1px solid #333; }
        .qty-btn { background: none; border: none; color: white; font-size: 16px; cursor: pointer; }

        .loc-card { background: #111; padding: 30px; border-left: 3px solid var(--gold); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .map-btn { color: #fff; text-decoration: none; border-bottom: 1px solid var(--gold); font-size: 12px; font-weight: 600; }

        .cart-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--gold); color: #000; padding: 15px 25px; display: none; justify-content: space-between; align-items: center; z-index: 2500; font-weight: 900; text-transform: uppercase; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }

        footer { padding: 40px; text-align: center; color: #444; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="nav('home')">Pondy Parottas</div>
    <nav>
        <a onclick="nav('home')" id="n-home" class="active">Home</a>
        <a onclick="nav('menu')" id="n-menu">Menu</a>
        <a onclick="nav('loc')" id="n-loc">Locations</a>
    </nav>
</header>

<div class="cat-quick-nav" id="cat-tabs" style="display:none;"></div>

<div id="home" class="page active">
    <div style="height:60vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
        <h1 style="font-size:3.5rem; color:var(--gold); font-weight:900;">ELITE TASTE</h1>
        <p style="color:#666; margin-bottom:30px; max-width:400px;">140+ Signature Dishes. 10+ Locations. One Legacy.</p>
        <button class="add-btn" style="padding:15px 40px; font-size:12px;" onclick="nav('menu')">Explore Full Menu</button>
    </div>
</div>

<div id="menu" class="page">
    <div class="search-container">
        <input type="text" id="search" class="search-input" placeholder="Search 140+ items..." onkeyup="filterMenu()">
    </div>
    <div id="menu-render"></div>
</div>

<div id="loc" class="page">
    <h2 class="cat-title">Find Us</h2>
    <div id="loc-render"></div>
</div>

<div class="cart-footer" id="cart-bar" onclick="checkout()">
    <div id="cart-data">0 ITEMS | ₹0</div>
    <div>ORDER VIA WHATSAPP ➔</div>
</div>

<footer>PONDY PAROTTAS HYDERABAD © 2026</footer>

<script>
    const fullMenu = {
        "Soups": [
            {n:"Hot & Sour Soup", p:160}, {n:"Manchow Soup", p:160}, {n:"Sweetcorn Soup", p:160}, {n:"Lemon Coriander Soup", p:160}, {n:"Curry Leaf Soup", p:160}, {n:"Chicken Manchow Soup", p:180}, {n:"Chettinadu Chicken Rasam", p:200}, {n:"Chettinad Crab Soup", p:200}, {n:"Mutton Bone Soup", p:200}, {n:"Prawn Noodle Soup", p:220}, {n:"Mix Seafood Soup", p:260}, {n:"Burmese Big Soup", p:260}
        ],
        "Ambur Biryani": [
            {n:"Ambur Chicken Biryani", p:240}, {n:"Ambur Mutton Spl Biryani", p:320}, {n:"Ambur Lollipop Biryani", p:250}, {n:"Ambur Chicken Fry Piece Biryani", p:250}, {n:"Ambur Prawn Biryani", p:330}, {n:"Ambur Biryani Rice & Egg", p:190}
        ],
        "Parottas": [
            {n:"Single Kerala Parotta", p:40}, {n:"Single Wheat Parotta", p:40}, {n:"Nool Parotta (2 Pcs)", p:50}, {n:"Chicken Kothu Parotta", p:280}, {n:"Mutton Kothu Parotta", p:320}, {n:"Egg Kothu Parotta", p:210}, {n:"Veg Kothu Parotta", p:190}, {n:"Chicken Lappa", p:290}, {n:"Mutton Lappa", p:330}, {n:"Double Egg Lappa", p:220}
        ],
        "Eggs": [
            {n:"Master Egg Kalaki", p:80}, {n:"Chicken Kalaki", p:130}, {n:"Prawn Kalaki", p:150}, {n:"Regular Omelette - Double", p:80}, {n:"Onion Masala Omelette", p:100}, {n:"Egg Bhurji - Double", p:120}, {n:"Chilly Egg", p:220}, {n:"Egg Manchurian", p:220}, {n:"Saarayakadai Muttai", p:230}, {n:"Egg Tawa Fry", p:230}, {n:"Egg Tawa Fry - Pepper", p:230}
        ],
        "Veg Starters": [
            {n:"Veg Manchurian", p:230}, {n:"Crispy Veg", p:220}, {n:"Crispy Corn", p:220}, {n:"Gobi Manchurian", p:260}, {n:"Tamilnadu Gobi 65", p:270}, {n:"Chilly Babycorn", p:270}, {n:"Chilly Mushroom", p:270}, {n:"Mushroom Manchurian", p:270}, {n:"Butter Garlic Mushroom", p:280}, {n:"Hyderabadi Paneer 65", p:300}, {n:"Tamilnadu Paneer 65", p:320}, {n:"Chilly Paneer", p:300}, {n:"Paneer Manchurian", p:300}
        ],
        "Non-Veg Starters": [
            {n:"Tamilnadu Chicken 65", p:310}, {n:"Chicken Lollipop", p:310}, {n:"Chicken Majestic", p:330}, {n:"Hongkong Chicken", p:330}, {n:"Ginger Chicken", p:330}, {n:"Drums Of Heaven", p:330}, {n:"Chicken Pakoda", p:340}, {n:"Nethili Fish Fry", p:310}, {n:"Karaikal Squid Fry", p:390}, {n:"Chettinadu Crab Fry", p:390}, {n:"Apollo Fish", p:420}, {n:"Chilly Prawns", p:420}, {n:"Tamilnadu Prawn 65", p:420}
        ],
        "Rice & Noodles": [
            {n:"Veg Fried Rice", p:189}, {n:"Veg Noodles", p:189}, {n:"Butter Garlic Rice", p:250}, {n:"Chicken Fried Rice", p:270}, {n:"Prawn Fried Rice", p:300}, {n:"Jeera Rice", p:210}, {n:"Curd Rice", p:180}, {n:"Ghee Kaju Rice", p:230}, {n:"Chicken Tawa Rice", p:270}
        ],
        "Dosas & Tiffins": [
            {n:"Medu Vada Plate", p:70}, {n:"Ghee Pongal", p:80}, {n:"Madurai Mutton Kari Dosa", p:190}, {n:"Kal Dosa + Chicken Curry", p:180}, {n:"Wheat Poori + Mutton Kheema", p:240}, {n:"Egg Uttapam + Mutton Kheema", p:280}
        ],
        "Drinks & Desserts": [
            {n:"Kadak Chai", p:40}, {n:"Kerala Kulukki", p:99}, {n:"Nannari Sharbat", p:99}, {n:"Brownie Milkshake", p:199}, {n:"Oreo Milkshake", p:169}, {n:"Cashew Junnu", p:110}, {n:"Chocolate Junnu", p:120}
        ]
    };

    const branches = [
        {n:"Kukatpally", a:"Near Manjeera Mall"}, {n:"Hitech City", a:"HITEX Road"}, {n:"SR Nagar", a:"Metro Station"},
        {n:"Manikonda", a:"Sreeram Nagar"}, {n:"Chanda Nagar", a:"Pipeline Road"}, {n:"Miyapur", a:"New Branch"}
    ];

    let cart = {};

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('cat-tabs').style.display = (id === 'menu') ? 'flex' : 'none';
        window.scrollTo(0,0);
    }

    function init() {
        const menuEl = document.getElementById('menu-render');
        const tabsEl = document.getElementById('cat-tabs');
        for (let cat in fullMenu) {
            const catId = cat.replace(/\s/g, '');
            tabsEl.innerHTML += `<div class="cat-tab" onclick="document.getElementById('${catId}').scrollIntoView({offset:-120})">${cat}</div>`;
            let html = `<h2 class="cat-title" id="${catId}">${cat}</h2><div class="menu-grid">`;
            fullMenu[cat].forEach(item => {
                const id = btoa(item.n).substring(0,8);
                html += `<div class="item-card" data-s="${item.n.toLowerCase()}">
                    <span class="item-name">${item.n}</span><span class="item-price">₹${item.p}</span>
                    <div class="qty-row" id="ctrl-${id}">
                        <button class="add-btn" onclick="update('${id}','${item.n}',${item.p},1)">Add</button>
                    </div></div>`;
            });
            menuEl.innerHTML += html + '</div>';
        }
        const locEl = document.getElementById('loc-render');
        branches.forEach(b => {
            locEl.innerHTML += `<div class="loc-card"><div><h3>${b.n}</h3><p>${b.a}</p></div>
            <a href="https://www.google.com/maps/search/Pondy+Parottas+${b.n}" target="_blank" class="map-btn">Map ➔</a></div>`;
        });
    }

    function update(id, name, price, change) {
        if (!cart[id]) cart[id] = { name, price, qty: 0 };
        cart[id].qty += change;
        const ctrl = document.getElementById('ctrl-'+id);
        if (cart[id].qty > 0) {
            ctrl.innerHTML = `<div class="qty-controls">
                <button class="qty-btn" onclick="update('${id}','${name}',${price},-1)">-</button>
                <span>${cart[id].qty}</span>
                <button class="qty-btn" onclick="update('${id}','${name}',${price},1)">+</button></div>`;
        } else {
            delete cart[id];
            ctrl.innerHTML = `<button class="add-btn" onclick="update('${id}','${name}',${price},1)">Add</button>`;
        }
        let c = 0, t = 0; for (let k in cart) { c += cart[k].qty; t += (cart[k].qty * cart[k].price); }
        document.getElementById('cart-bar').style.display = c > 0 ? 'flex' : 'none';
        document.getElementById('cart-data').innerText = `${c} ITEMS | ₹${t}`;
    }

    function filterMenu() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.item-card').forEach(c => c.style.display = c.dataset.s.includes(q) ? 'block' : 'none');
    }

    function checkout() {
        let text = "*PONDY PAROTTAS ORDER*%0A";
        for (let k in cart) text += `*${cart[k].qty} x ${cart[k].name}* - ₹${cart[k].qty * cart[k].price}%0A`;
        text += `%0ATotal: ${document.getElementById('cart-data').innerText.split('|')[1]}`;
        window.open(`https://wa.me/918186004000?text=${encodeURIComponent(text)}`);
    }

    init();
</script>
</body>
</html>
